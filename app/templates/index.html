<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>To-Do List</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<h1>To-Do List</h1>

<p>Aplicação utilizada no trabalho de CI/CD.</p>

<ul>

{% for tarefa in tarefas %}

<li>

{{ tarefa.title }}

</li>

{% else %}

<li>Nenhuma tarefa cadastrada.</li>

{% endfor %}

</ul>

</body>

</html>
