name: CI/CD Todo

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        working-directory: app
        run: docker build -t todo-app:ci .

      - name: Test Container
        working-directory: app
        run: docker run --rm todo-app:ci python -c "print('Teste executado com sucesso')"

  deploy:

    needs: build-and-test

    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Copiar aplicação
        run: |
          rsync -avz \
            --delete \
            --exclude='.git' \
            --exclude='.env' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./app/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:~/todo-app/

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_rsa \
          ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} \
          "cd ~/todo-app && docker compose up -d --build"
